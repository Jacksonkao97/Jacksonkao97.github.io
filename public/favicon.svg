<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&amp;display=swap');
      
      .favicon-text {
        font-family: 'Libre Caslon Text', 'Georgia', 'Times New Roman', serif;
        font-size: 270px;
        font-weight: 100;
        fill: #1a1a1a; /* Sleek off-black/dark charcoal color */
        text-anchor: middle;
        dominant-baseline: central;
      }

      /* Optional: Optimizes the favicon if the user has a dark mode browser theme */
      @media (prefers-color-scheme: dark) {
        .favicon-text {
          fill: #f5f5f5; /* Swaps to off-white in dark mode tabs */
        }
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="transparent" />
  
  <text x="50%" y="48%" class="favicon-text">Js.K</text>
</svg>
